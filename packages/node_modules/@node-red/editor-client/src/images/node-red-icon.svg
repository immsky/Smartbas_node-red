<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- SmartBAS icon badge -->
  <defs>
    <style>
      .icon-bg { fill: #1a2412; }
      .icon-text-s { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-size: 26px; font-weight: 700; fill: #D4A017; }
      .icon-text-b { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-size: 26px; font-weight: 900; fill: #E8B800; }
    </style>
  </defs>

  <!-- Rounded square background -->
  <rect x="2" y="2" width="60" height="60" rx="12" ry="12" class="icon-bg"/>

  <!-- Green leaf accent -->
  <circle cx="50" cy="14" r="8" fill="#4CAF50" opacity="0.8"/>
  <line x1="47" y1="11" x2="53" y2="17" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
  <line x1="47" y1="14" x2="53" y2="14" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
  <line x1="50" y1="8" x2="50" y2="20" stroke="#fff" stroke-width="0.8" opacity="0.5"/>

  <!-- SB text -->
  <text x="30" y="45" text-anchor="middle" class="icon-text-s">S</text>
  <text x="42" y="45" text-anchor="middle" class="icon-text-b">B</text>
</svg>
