<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 40" width="300" height="40">
  <!-- SmartBAS header logo -->
  <defs>
    <style>
      .logo-text-smart { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #D4A017; }
      .logo-text-bas { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-size: 24px; font-weight: 900; fill: #E8B800; }
      .logo-subtitle { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-size: 10px; font-weight: 400; fill: #8BAA6B; letter-spacing: 0.5px; }
    </style>
  </defs>

  <!-- Leaf/building icon -->
  <g transform="translate(2, 4) scale(0.55)">
    <!-- Gold swoosh arc -->
    <path d="M28 48 C10 40, 5 20, 20 5 C25 0, 35 -2, 42 3" stroke="#D4A017" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M28 48 C46 40, 51 20, 36 5" stroke="#C8960C" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Green leaf shape -->
    <path d="M28 6 C18 6, 10 16, 10 28 C10 38, 18 46, 28 46 C38 46, 46 38, 46 28 C46 16, 38 6, 28 6 Z" fill="#4CAF50" opacity="0.85"/>
    <!-- Grid lines on leaf -->
    <line x1="18" y1="16" x2="38" y2="16" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <line x1="15" y1="24" x2="41" y2="24" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <line x1="16" y1="32" x2="40" y2="32" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <line x1="20" y1="40" x2="36" y2="40" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <line x1="22" y1="10" x2="22" y2="45" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <line x1="28" y1="7" x2="28" y2="46" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
    <line x1="34" y1="10" x2="34" y2="45" stroke="#fff" stroke-width="0.8" opacity="0.5"/>
  </g>

  <!-- Main logo text -->
  <text x="38" y="24" class="logo-text-smart">Smart</text>
  <text x="108" y="24" class="logo-text-bas">BAS</text>

  <!-- Subtitle -->
  <text x="38" y="37" class="logo-subtitle">Smart Building Automation Solutions</text>
</svg>
