<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 280 40" width="280" height="40">
  <!-- SmartBAS header logo -->
  <defs>
    <style>
      .logo-text-smart { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #ffffff; }
      .logo-text-bas { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-size: 24px; font-weight: 700; fill: #00b4d8; }
      .logo-subtitle { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-size: 11px; font-weight: 400; fill: #8899aa; }
    </style>
  </defs>

  <!-- Main logo text -->
  <text x="0" y="24" class="logo-text-smart">Smart</text>
  <text x="72" y="24" class="logo-text-bas">BAS</text>

  <!-- Subtitle -->
  <text x="0" y="37" class="logo-subtitle">BMS Automation Build</text>
</svg>
