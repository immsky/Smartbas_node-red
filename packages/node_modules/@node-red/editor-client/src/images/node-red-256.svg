<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- SmartBAS icon badge 256px - "SB" -->
  <defs>
    <style>
      .icon-bg-256 { fill: #0a1628; }
      .icon-text-256 { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-size: 120px; font-weight: 700; fill: #00b4d8; }
      .icon-subtitle-256 { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-size: 24px; font-weight: 400; fill: #8899aa; text-anchor: middle; }
    </style>
  </defs>

  <!-- Rounded square background -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" class="icon-bg-256"/>

  <!-- SB text -->
  <text x="128" y="160" text-anchor="middle" class="icon-text-256">SB</text>

  <!-- SmartBAS subtitle -->
  <text x="128" y="210" class="icon-subtitle-256">SmartBAS</text>
</svg>
