<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- SmartBAS icon badge 256px -->
  <defs>
    <style>
      .icon-bg-256 { fill: #1a2412; }
      .icon-text-s-256 { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-size: 110px; font-weight: 700; fill: #D4A017; }
      .icon-text-b-256 { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-size: 110px; font-weight: 900; fill: #E8B800; }
      .icon-subtitle-256 { font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif; font-size: 22px; font-weight: 400; fill: #8BAA6B; text-anchor: middle; }
    </style>
  </defs>

  <!-- Rounded square background -->
  <rect x="8" y="8" width="240" height="240" rx="48" ry="48" class="icon-bg-256"/>

  <!-- Green leaf accent -->
  <g transform="translate(170, 25) scale(1.2)">
    <circle cx="25" cy="25" r="22" fill="#4CAF50" opacity="0.85"/>
    <line x1="12" y1="15" x2="38" y2="15" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <line x1="10" y1="25" x2="40" y2="25" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <line x1="12" y1="35" x2="38" y2="35" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <line x1="20" y1="6" x2="20" y2="44" stroke="#fff" stroke-width="1" opacity="0.5"/>
    <line x1="30" y1="6" x2="30" y2="44" stroke="#fff" stroke-width="1" opacity="0.5"/>
  </g>

  <!-- SB text -->
  <text x="100" y="170" text-anchor="middle" class="icon-text-s-256">S</text>
  <text x="160" y="170" text-anchor="middle" class="icon-text-b-256">B</text>

  <!-- SmartBAS subtitle -->
  <text x="128" y="215" class="icon-subtitle-256">SmartBAS</text>
</svg>
